# Prefer a real higher-resolution VESA framebuffer at boot.  The shell still
# lays out dynamically from the framebuffer size; this only avoids QEMU picking
# a tiny 640x480 mode and then scaling it in the host window.
set gfxmode=1280x720x32,1366x768x32,1600x900x32,1024x768x32,800x600x32,auto
set gfxpayload=keep

menuentry "Core97" {
    multiboot /boot/kernel.bin
}
